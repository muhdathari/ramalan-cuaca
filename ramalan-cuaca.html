<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ramalan Cuaca</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:#0f2e28;
    color:#e8f5f0;
    width:100%;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    width:100%;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:7px;
  }

  /* ── header ── */
  .hdr{
    background:#1a4a42;
    border-radius:8px;
    padding:8px 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .hdr-title{
    font-size:12px;font-weight:700;color:#fff;
    white-space:nowrap;letter-spacing:0.02em;
  }
  .hdr-right{display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;min-width:0;}
  select{
    background:#0f2e28;color:#9dd4c0;
    border:1px solid #2a6b5e;border-radius:5px;
    padding:3px 6px;font-size:11.5px;
    font-family:'Inter',sans-serif;cursor:pointer;
    max-width:160px;outline:none;
  }
  select:focus{border-color:#4db89a;}
  .btn-ref{
    background:none;border:none;color:#6ab89e;
    cursor:pointer;font-size:15px;line-height:1;
    padding:2px;flex-shrink:0;
  }
  .btn-ref:hover{color:#9dd4c0;}

  /* ── condition card ── */
  .cond-card{
    background:#1a4a42;border-radius:8px;
    padding:10px 12px;display:flex;align-items:center;gap:10px;
  }
  .cond-icon{flex-shrink:0;width:40px;height:40px;color:#f0b841;}
  .cond-icon svg{width:100%;height:100%;}
  .cond-info{flex:1;min-width:0;}
  .cond-date{font-size:10px;color:#6ab89e;margin-bottom:2px;}
  .cond-text{font-size:13.5px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:1px;}
  .cond-bm{font-size:10.5px;color:#6ab89e;font-style:italic;margin-bottom:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cond-when{font-size:10.5px;color:#9dd4c0;}

  /* ── data rows ── */
  .data-panel{background:#1a4a42;border-radius:8px;overflow:hidden;}
  .data-row{
    display:flex;align-items:center;
    justify-content:space-between;
    padding:7px 12px;
    border-bottom:1px solid #0f2e28;
  }
  .data-row:last-child{border-bottom:none;}
  .data-label{font-size:11.5px;color:#9dd4c0;}
  .data-val{
    font-size:14px;font-weight:700;color:#4db89a;
    display:flex;align-items:baseline;gap:3px;
  }
  .data-val .unit{font-size:10px;font-weight:500;color:#6ab89e;}
  .data-val.na{color:#3a7a6a;font-size:12px;font-weight:500;}
  .live-dot{
    width:6px;height:6px;border-radius:50%;
    background:#4db89a;display:inline-block;
    margin-left:4px;vertical-align:middle;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* ── 5-day strip ── */
  .sec-label{
    font-size:10px;font-weight:600;text-transform:uppercase;
    letter-spacing:0.08em;color:#4d8a78;padding:0 2px;
  }
  .strip{
    display:flex;gap:5px;overflow-x:auto;
    scrollbar-width:thin;scrollbar-color:#1a4a42 transparent;
  }
  .strip::-webkit-scrollbar{height:3px;}
  .strip::-webkit-scrollbar-thumb{background:#1a4a42;border-radius:2px;}
  .day{
    flex:0 0 auto;width:60px;
    background:#1a4a42;border-radius:7px;
    padding:7px 4px;text-align:center;
  }
  .day .d-date{font-size:9.5px;color:#6ab89e;margin-bottom:4px;line-height:1.3;}
  .day .d-icon{width:22px;height:22px;margin:0 auto 4px;color:#9dd4c0;}
  .day .d-icon svg{width:100%;height:100%;}
  .day .d-temp{font-size:11px;font-weight:600;}
  .day .d-temp .mx{color:#f0b841;}
  .day .d-temp .mn{color:#6ab89e;margin-left:2px;}

  /* ── warnings ── */
  .warn-card{
    background:rgba(200,60,50,0.15);
    border:1px solid rgba(200,60,50,0.35);
    border-radius:7px;padding:8px 10px;margin-bottom:6px;
  }
  .warn-card:last-child{margin-bottom:0;}
  .warn-title{font-size:11px;font-weight:700;color:#e05a4a;margin-bottom:3px;}
  .warn-text{font-size:10.5px;color:#e8f5f0;line-height:1.45;margin-bottom:4px;}
  .warn-period{font-size:9.5px;color:#6ab89e;}
  .calm{
    display:flex;align-items:center;gap:7px;
    background:#1a4a42;border-radius:7px;
    padding:7px 10px;font-size:11px;color:#6ab89e;
  }
  .calm-dot{width:7px;height:7px;border-radius:50%;background:#4db89a;flex-shrink:0;}

  .skeleton{color:#4d8a78;font-size:11.5px;padding:8px;text-align:center;}
  .updated{font-size:9.5px;color:#3a6a5a;text-align:right;padding:0 2px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <span class="hdr-title">☁ Ramalan Cuaca</span>
    <div class="hdr-right">
      <select id="stateSelect"><option>Loading…</option></select>
      <button class="btn-ref" id="refreshBtn" title="Refresh">↻</button>
    </div>
  </div>

  <div id="condSlot"><div class="skeleton">Loading…</div></div>

  <div class="data-panel">
    <div class="data-row">
      <span class="data-label">Temperature</span>
      <span class="data-val" id="rowTemp"><span class="na">—</span></span>
    </div>
    <div class="data-row">
      <span class="data-label">Wind <span id="windDot"></span></span>
      <span class="data-val" id="rowWind"><span class="na">—</span> <span class="unit">km/h</span></span>
    </div>
    <div class="data-row">
      <span class="data-label">Pressure <span id="pressDot"></span></span>
      <span class="data-val" id="rowPressure"><span class="na">—</span> <span class="unit">hPa</span></span>
    </div>
  </div>

  <span class="sec-label">5-Day Outlook</span>
  <div class="strip" id="stripSlot"></div>

  <span class="sec-label" id="warnLabel" style="display:none">⚠ Active Warnings</span>
  <div id="warnSlot"></div>

  <span class="updated" id="updatedAt"></span>
</div>

<script>
const BASE = 'https://api.data.gov.my/weather';
const EXCLUDE = ['sabah','sarawak','labuan'];
const PREFERRED = 'Selangor';

// Coordinates for each Peninsular Malaysian state (for Open-Meteo wind/pressure)
const STATE_COORDS = {
  'Johor':             { lat: 1.4854,  lon: 103.7618 },
  'Kedah':             { lat: 6.1184,  lon: 100.3685 },
  'Kelantan':          { lat: 6.1254,  lon: 102.2381 },
  'Melaka':            { lat: 2.1896,  lon: 102.2501 },
  'Negeri Sembilan':   { lat: 2.7258,  lon: 101.9424 },
  'Pahang':            { lat: 3.8126,  lon: 103.3256 },
  'Perak':             { lat: 4.5921,  lon: 101.0901 },
  'Perlis':            { lat: 6.4449,  lon: 100.2048 },
  'Pulau Pinang':      { lat: 5.4141,  lon: 100.3288 },
  'Selangor':          { lat: 3.0738,  lon: 101.5183 },
  'Terengganu':        { lat: 5.3117,  lon: 103.1324 },
  'WP Kuala Lumpur':   { lat: 3.1390,  lon: 101.6869 },
  'WP Putrajaya':      { lat: 2.9264,  lon: 101.6964 },
};

const CDICT = {
  'berjerebu':'Hazy','tiada hujan':'No rain','hujan':'Rain',
  'hujan di beberapa tempat':'Scattered rain',
  'hujan di satu dua tempat':'Isolated rain',
  'hujan di satu dua tempat di kawasan pantai':'Isolated rain (coastal)',
  'hujan di satu dua tempat di kawasan pedalaman':'Isolated rain (inland)',
  'hujan di kebanyakan tempat':'Rain in most areas',
  'hujan menyeluruh':'Widespread rain',
  'ribut petir':'Thunderstorms',
  'ribut petir di beberapa tempat':'Scattered thunderstorms',
  'ribut petir di beberapa tempat di kawasan pedalaman':'Scattered T-storms (inland)',
  'ribut petir di satu dua tempat':'Isolated thunderstorms',
  'ribut petir di satu dua tempat di kawasan pantai':'Isolated T-storms (coastal)',
  'ribut petir di satu dua tempat di kawasan pedalaman':'Isolated T-storms (inland)',
  'ribut petir di kebanyakan tempat':'T-storms in most areas',
  'ribut petir menyeluruh':'Widespread thunderstorms',
};
const WDICT = {
  'pagi':'Morning','malam':'Night','petang':'Afternoon',
  'pagi dan petang':'Morning & afternoon','pagi dan malam':'Morning & night',
  'petang dan malam':'Afternoon & night','sepanjang hari':'All day',
};

function tc(t){
  if(!t)return'No data';
  const k=t.trim().toLowerCase();
  if(CDICT[k])return CDICT[k];
  let s=k;
  [[/ribut petir/g,'T-storms'],[/tiada hujan/g,'no rain'],[/\bhujan\b/g,'rain'],
   [/berjerebu/g,'hazy'],[/di kebanyakan tempat/g,'in most areas'],
   [/di beberapa tempat/g,'scattered'],[/di satu dua tempat/g,'isolated'],
   [/menyeluruh/g,'widespread'],[/kawasan pantai/g,'coastal'],
   [/kawasan pedalaman/g,'inland'],[/\bdi\b/g,'']
  ].forEach(([r,v])=>s=s.replace(r,v));
  return s.trim().charAt(0).toUpperCase()+s.trim().slice(1);
}
function tw(t){return t?WDICT[t.trim().toLowerCase()]||t:'';}
function cls(t){
  const s=(t||'').toLowerCase();
  if(s.includes('ribut petir'))return'storm';
  if(s.includes('berjerebu'))return'haze';
  if(s.includes('tiada hujan'))return'clear';
  if(s.includes('hujan'))return'rain';
  return'clear';
}
const ICO={
  storm:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 38a10 10 0 0 1-2-19.8A13 13 0 0 1 41 14a11 11 0 0 1 9 17.3"/><path d="M16 38h30a8 8 0 0 0 0-16"/><path d="M30 40l-6 11h7l-5 9" stroke="#f0b841"/></svg>`,
  rain:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 36a10 10 0 0 1-2-19.8A13 13 0 0 1 41 12a11 11 0 0 1 9 17.3"/><path d="M14 36h32a8 8 0 0 0 0-16"/><path d="M22 44l-3 8M32 44l-3 8M42 44l-3 8"/></svg>`,
  haze:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="26" r="11"/><path d="M12 26h6M50 26h6M32 4v6M32 42v6M14 8l4 4M46 8l-4 4"/><path d="M8 46h48M12 54h40" opacity="0.5"/></svg>`,
  clear:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="13"/><path d="M32 6v8M32 50v8M6 32h8M50 32h8M13 13l6 6M45 45l6 6M51 13l-6 6M19 45l-6 6"/></svg>`,
};

function dayLabel(d){
  return new Date(d+'T00:00:00+08:00')
    .toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function fmtPeriod(ts){
  if(!ts)return'—';
  return new Date(ts).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

let stateData={};

async function fetchJ(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadForecast(){
  document.getElementById('condSlot').innerHTML='<div class="skeleton">Loading…</div>';
  try{
    const rows=await fetchJ(`${BASE}/forecast?contains=St@location__location_id&limit=250`);
    stateData={};
    rows.forEach(r=>{
      const n=r.location.location_name;
      (stateData[n]||=[]).push(r);
    });
    Object.keys(stateData).forEach(n=>stateData[n].sort((a,b)=>a.date.localeCompare(b.date)));
    const names=Object.keys(stateData)
      .filter(n=>!EXCLUDE.some(ex=>n.toLowerCase().includes(ex)))
      .sort();
    const sel=document.getElementById('stateSelect');
    sel.innerHTML=names.map(n=>`<option value="${n}">${n}</option>`).join('');
    sel.value=names.includes(PREFERRED)?PREFERRED:names[0];
    sel.onchange=()=>selectState(sel.value);
    selectState(sel.value);
  }catch(e){
    document.getElementById('condSlot').innerHTML=
      `<div class="skeleton" style="color:#e05a4a">Error: ${e.message}</div>`;
  }
}

function selectState(name){
  const days=stateData[name];
  if(!days||!days.length)return;
  renderCond(days[0]);
  renderStrip(days.slice(1,6));
  loadLiveWeather(name);
}

function renderCond(d){
  const k=cls(d.summary_forecast);
  document.getElementById('condSlot').innerHTML=`
    <div class="cond-card">
      <div class="cond-icon">${ICO[k]}</div>
      <div class="cond-info">
        <div class="cond-date">${dayLabel(d.date)}</div>
        <div class="cond-text">${tc(d.summary_forecast)}</div>
        <div class="cond-bm">"${d.summary_forecast}"</div>
        <div class="cond-when">${tw(d.summary_when)||'&nbsp;'}</div>
      </div>
    </div>`;
  document.getElementById('rowTemp').innerHTML=
    `<span style="color:#f0b841">${d.max_temp}</span><span class="unit">°C max</span>&nbsp;<span style="color:#9dd4c0;font-size:12px">${d.min_temp}°</span><span class="unit">min</span>`;
}

function renderStrip(days){
  document.getElementById('stripSlot').innerHTML=days.map(d=>{
    const k=cls(d.summary_forecast);
    return`<div class="day">
      <div class="d-date">${dayLabel(d.date)}</div>
      <div class="d-icon">${ICO[k]}</div>
      <div class="d-temp"><span class="mx">${d.max_temp}°</span><span class="mn">${d.min_temp}°</span></div>
    </div>`;
  }).join('');
}

async function loadLiveWeather(stateName){
  // Reset
  document.getElementById('rowWind').innerHTML=`<span class="na">—</span> <span class="unit">km/h</span>`;
  document.getElementById('rowPressure').innerHTML=`<span class="na">—</span> <span class="unit">hPa</span>`;
  document.getElementById('windDot').innerHTML='';
  document.getElementById('pressDot').innerHTML='';

  const coords=STATE_COORDS[stateName];
  if(!coords)return;

  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current=wind_speed_10m,surface_pressure&wind_speed_unit=kmh&timezone=Asia%2FKuala_Lumpur`;
    const data=await fetchJ(url);
    const c=data.current;
    if(c){
      document.getElementById('rowWind').innerHTML=
        `<span style="color:#4db89a">${Math.round(c.wind_speed_10m)}</span><span class="unit">km/h</span>`;
      document.getElementById('rowPressure').innerHTML=
        `<span style="color:#4db89a">${Math.round(c.surface_pressure)}</span><span class="unit">hPa</span>`;
      document.getElementById('windDot').innerHTML='<span class="live-dot"></span>';
      document.getElementById('pressDot').innerHTML='<span class="live-dot"></span>';
    }
  }catch(e){
    // silently fail — keep showing —
  }
}

async function loadWarnings(){
  const slot=document.getElementById('warnSlot');
  const lbl=document.getElementById('warnLabel');
  try{
    const rows=await fetchJ(`${BASE}/warning?sort=-valid_to&limit=8`);
    const now=new Date();
    const active=rows.filter(w=>w.valid_to&&new Date(w.valid_to)>=now);
    if(!active.length){
      lbl.style.display='none';
      slot.innerHTML=`<div class="calm"><span class="calm-dot"></span>No active warnings from MET Malaysia.</div>`;
      return;
    }
    lbl.style.display='';
    slot.innerHTML=active.slice(0,3).map(w=>`
      <div class="warn-card">
        <div class="warn-title">${w.heading_en||w.title_en||'Weather Warning'}</div>
        <div class="warn-text">${w.text_en||''}</div>
        <div class="warn-period">Valid ${fmtPeriod(w.valid_from)} → ${fmtPeriod(w.valid_to)}</div>
      </div>`).join('');
  }catch(e){slot.innerHTML='';}
}

function stamp(){
  document.getElementById('updatedAt').textContent=
    'MET Malaysia + Open-Meteo · Updated '+
    new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

async function loadAll(){
  await loadForecast();
  loadWarnings();
  stamp();
}

document.getElementById('refreshBtn').onclick=loadAll;
loadAll();

// Auto-refresh wind & pressure every 5 seconds
setInterval(()=>{
  const sel=document.getElementById('stateSelect');
  if(sel&&sel.value)loadLiveWeather(sel.value);
},5000);
</script>
</body>
</html>
